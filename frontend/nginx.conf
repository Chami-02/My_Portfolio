# Serves the React SPA and handles all routing correctly.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── React Router support ──────────────────────────────────────────────────
    # For every URL, try to serve the file, then the directory, then fall back
    # to index.html. This lets React Router handle /admin, /blog/slug, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy to backend ──────────────────────────────────────────────────
    # In production on Railway, you'll set VITE_API_URL to the backend URL.
    # This nginx proxy block is only needed if you deploy frontend+backend together.
    # For Vercel+Railway (our setup), this block can be removed.

    # ── Cache static assets aggressively ────────────────────────────────────
    # Vite bundles JS/CSS with content hashes in filenames — safe to cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;   # Don't log every image request
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;
}